<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Replier — AI Responses to Customer Reviews in Seconds</title>
  <meta name="description" content="Paste any customer review and get a professional, human-sounding response ready to post in under 10 seconds. Built for small business owners."/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #faf7f2;
      --dark: #141210;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --muted: #7a7268;
      --border: #e8e2d8;
      --white: #ffffff;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{background:var(--cream);color:var(--dark);font-family:'DM Sans',sans-serif;overflow-x:hidden}
    nav{display:flex;justify-content:space-between;align-items:center;padding:18px 48px;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,247,242,0.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--dark)}
    .logo-text{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;letter-spacing:-0.01em}
    .logo-text span{color:var(--gold)}
    .nav-links{display:flex;align-items:center;gap:32px}
    .nav-links a{font-size:14px;color:var(--muted);text-decoration:none;font-weight:400;transition:color 0.2s}
    .nav-links a:hover{color:var(--dark)}
    .nav-cta{background:var(--dark);color:var(--cream)!important;padding:10px 22px;border-radius:100px;font-size:14px;font-weight:500!important;transition:all 0.2s!important}
    .nav-cta:hover{background:#2a2218!important;transform:translateY(-1px)}
    @media(max-width:640px){.nav-links .hide-mobile{display:none}nav{padding:16px 20px}}
    .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:140px 24px 80px;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -5%,rgba(201,168,76,0.13) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 10% 90%,rgba(201,168,76,0.06) 0%,transparent 50%);pointer-events:none}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:100px;padding:6px 18px;font-size:13px;color:#8a6a20;font-weight:500;margin-bottom:32px;animation:fadeUp 0.7s ease both}
    .hero h1{font-family:'Playfair Display',serif;font-size:clamp(44px,8.5vw,92px);font-weight:900;line-height:1.0;letter-spacing:-0.03em;max-width:900px;margin-bottom:28px;animation:fadeUp 0.7s 0.1s ease both}
    .hero h1 em{font-style:italic;color:var(--gold)}
    .hero p{font-size:clamp(16px,2.2vw,19px);color:var(--muted);max-width:500px;line-height:1.75;margin-bottom:44px;font-weight:300;animation:fadeUp 0.7s 0.2s ease both}
    .hero-actions{display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center;animation:fadeUp 0.7s 0.3s ease both}
    .btn-primary{background:var(--dark);color:var(--cream);padding:16px 36px;border-radius:100px;font-size:16px;font-weight:500;text-decoration:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif}
    .btn-primary:hover{background:var(--gold);color:var(--dark);transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,0.35)}
    .btn-ghost{color:var(--muted);font-size:15px;font-weight:400;text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s}
    .btn-ghost:hover{color:var(--dark)}
    .proof-strip{display:flex;justify-content:center;gap:48px;flex-wrap:wrap;padding:28px 48px;background:var(--dark);color:rgba(255,255,255,0.4);font-size:13px;letter-spacing:0.1em;text-transform:uppercase}
    .proof-strip span{display:flex;align-items:center;gap:10px}
    .proof-strip strong{color:var(--gold);font-size:22px;font-family:'Playfair Display',serif}
    .section{padding:96px 48px;max-width:1100px;margin:0 auto}
    .section-label{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:14px}
    .section-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4.5vw,50px);font-weight:700;line-height:1.15;letter-spacing:-0.02em;margin-bottom:14px}
    .section-sub{color:var(--muted);font-size:17px;font-weight:300;line-height:1.7;max-width:480px;margin-bottom:56px}
    .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:2px;background:var(--border);border:1px solid var(--border);border-radius:20px;overflow:hidden}
    .step{background:var(--cream);padding:40px 32px;transition:background 0.2s}
    .step:hover{background:#f5f0e8}
    .step-num{font-family:'Playfair Display',serif;font-size:60px;font-weight:900;color:rgba(201,168,76,0.13);line-height:1;margin-bottom:14px}
    .step h3{font-size:18px;font-weight:600;margin-bottom:10px;font-family:'Playfair Display',serif}
    .step p{color:var(--muted);font-size:15px;line-height:1.65;font-weight:300}
    .demo-section{background:var(--dark);padding:96px 48px;position:relative;overflow:hidden}
    .demo-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,rgba(201,168,76,0.07) 0%,transparent 70%);pointer-events:none}
    .demo-inner{max-width:1100px;margin:0 auto;position:relative;z-index:1}
    .demo-inner .section-title{color:var(--cream)}
    .demo-inner .section-sub{color:rgba(255,255,255,0.35)}
    .demo-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:20px;padding:36px;display:grid;grid-template-columns:1fr 60px 1fr;gap:24px;align-items:center}
    .demo-box{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px}
    .demo-box-label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:14px}
    .demo-box p{color:rgba(255,255,255,0.65);font-size:14px;line-height:1.75;font-weight:300;font-style:italic}
    .demo-box.response{border-color:rgba(201,168,76,0.22);background:rgba(201,168,76,0.05)}
    .demo-box.response p{color:rgba(255,255,255,0.85);font-style:normal}
    .stars-demo{color:var(--gold);font-size:15px;margin-bottom:12px}
    .demo-arrow{color:var(--gold);font-size:28px;text-align:center;opacity:0.7}
    @media(max-width:768px){.demo-card{grid-template-columns:1fr}.demo-arrow{transform:rotate(90deg)}}
    .pricing-bg{background:var(--white);padding:96px 48px}
    .pricing-inner{max-width:1100px;margin:0 auto}
    .pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:48px}
    .price-card{background:var(--cream);border:1px solid var(--border);border-radius:20px;padding:40px 36px;position:relative;transition:transform 0.2s,box-shadow 0.2s}
    .price-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.07)}
    .price-card.featured{background:var(--dark);border-color:var(--dark);color:var(--cream)}
    .featured-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--dark);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 18px;border-radius:100px;white-space:nowrap}
    .price-name{font-size:13px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
    .price-card.featured .price-name{color:rgba(255,255,255,0.35)}
    .price-amount{font-family:'Playfair Display',serif;font-size:54px;font-weight:900;line-height:1;margin-bottom:4px}
    .price-sub{color:var(--muted);font-size:14px;margin-bottom:32px;font-weight:300}
    .price-card.featured .price-sub{color:rgba(255,255,255,0.35)}
    .feature-list{list-style:none;margin-bottom:36px}
    .feature-item{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--muted);padding:9px 0;border-bottom:1px solid var(--border);font-weight:300}
    .price-card.featured .feature-item{border-color:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6)}
    .check{color:var(--gold);font-size:15px;flex-shrink:0}
    .price-btn{display:block;text-align:center;padding:14px 24px;border-radius:100px;font-size:15px;font-weight:500;text-decoration:none;cursor:pointer;transition:all 0.2s;border:2px solid var(--dark);background:transparent;color:var(--dark);font-family:'DM Sans',sans-serif;width:100%}
    .price-card.featured .price-btn{background:var(--gold);border-color:var(--gold);color:var(--dark)}
    .price-btn:hover{opacity:0.8;transform:translateY(-1px)}
    .testi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:20px;margin-top:48px}
    .testi-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:32px;transition:transform 0.2s}
    .testi-card:hover{transform:translateY(-3px)}
    .testi-stars{color:var(--gold);font-size:14px;margin-bottom:16px;letter-spacing:2px}
    .testi-text{font-size:15px;line-height:1.75;color:var(--dark);margin-bottom:20px;font-weight:300;font-style:italic}
    .testi-author{font-size:13px;font-weight:500;color:var(--muted)}
    .tool-section{background:#f0ece4;padding:96px 48px}
    .tool-inner{max-width:680px;margin:0 auto;text-align:center}
    .tool-card{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:40px;text-align:left;margin-top:48px;box-shadow:0 4px 24px rgba(0,0,0,0.05)}
    label.field-label{display:block;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:500}
    .field-group{margin-bottom:22px}
    .tool-input,.tool-textarea{width:100%;border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--dark);outline:none;background:var(--cream);transition:border-color 0.2s;line-height:1.6}
    .tool-input:focus,.tool-textarea:focus{border-color:var(--gold);background:var(--white)}
    .tool-textarea{resize:vertical}
    .tone-row{display:flex;gap:8px;flex-wrap:wrap}
    .tone-btn{background:none;border:1px solid var(--border);border-radius:100px;padding:7px 16px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all 0.15s;font-weight:400}
    .tone-btn.active{background:var(--dark);border-color:var(--dark);color:var(--white);font-weight:500}
    .gen-btn{width:100%;background:var(--dark);color:var(--cream);border:none;border-radius:100px;padding:16px 24px;font-size:16px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px}
    .gen-btn:hover:not(:disabled){background:var(--gold);color:var(--dark)}
    .gen-btn:disabled{opacity:0.5;cursor:not-allowed}
    .output-box{display:none;margin-top:22px;background:var(--cream);border:1px solid rgba(201,168,76,0.3);border-radius:14px;padding:24px}
    .output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .output-label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);font-weight:600}
    .copy-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--muted);transition:all 0.15s}
    .copy-btn:hover{border-color:var(--gold);color:var(--gold)}
    .output-text{font-size:15px;line-height:1.8;color:var(--dark);margin:0;font-weight:300}
    .error-msg{display:none;color:#c0392b;font-size:13px;margin-top:10px;text-align:center}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:currentColor;border-radius:50%;animation:spin 0.7s linear infinite}
    .faq-section{padding:96px 48px;max-width:760px;margin:0 auto}
    .faq-item{border-bottom:1px solid var(--border);padding:24px 0;cursor:pointer}
